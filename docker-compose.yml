services:
  momentum:
    build: .
    container_name: justetf-momentum
    restart: unless-stopped
    ports:
      - "80:3000"
    volumes:
      - ./data:/app/data              # persystentna baza SQLite
      - ./config.yaml:/app/config.yaml:ro   # konfiguracja główna (edytuj bez rebuildu)
      - ./groups.yaml:/app/groups.yaml:ro   # reguły grupowania ETFów (edytuj bez rebuildu)
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CRON_SCHEDULE=0 6 * * *   # codziennie o 06:00
      - CRON_BROKERS=30 5 1 * *   # 5:30 w pierwszy dzień miesiąca
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
