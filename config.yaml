# ═══════════════════════════════════════════════════════════════════════════════
# Momentum ETF — konfiguracja główna
# ═══════════════════════════════════════════════════════════════════════════════

ranking:
  # Wagi dla MS = w1·R1M + w3·R3M + w6·R6M + w12·R12M + w12s·R(12M-1M) + wmdd·MDD12M
  # Suma aktywnych wag powinna wynosić 1.0 (nieaktywne = 0.0 są normalizowane automatycznie)
  weights:
    r1m:          0.25
    r3m:          0.33
    r6m:          0.33
    r12m:         0.09
    r12m_skip1m:  0.00   # R(t-12,t-1) — zwrot 12M z pominięciem ostatniego miesiąca
    mdd12m:       0.00   # MDD12M — max drawdown 12M (liczba ujemna, naturalnie karze)

filters:
  # Zmienność roczna (%)
  defaultMinVolatility: ""
  defaultMaxVolatility: ""

  # Aktywa pod zarządzaniem (mln EUR)
  defaultMinAumMillions: ""
  defaultMaxAumMillions: ""

  # TER (%) — opłata za zarządzanie
  defaultMinTer: ""
  defaultMaxTer: "1.25"

  # Raw Momentum Score (MS, w %)
  defaultMinMS: "2.25"
  defaultMaxMS: ""

  # Momentum Score znormalizowany przez vol (MS_adj = MS/Vol)
  defaultMinAdjMS: ""
  defaultMaxAdjMS: ""

  # Zwrot 12M w PLN (%)
  defaultMinR12M: ""
  defaultMaxR12M: ""

  # MDD 12M (%) — max drawdown; wartości ujemne, np. -25 = odrzuć jeśli MDD < -25%
  defaultMinMDD12M: ""
  defaultMaxMDD12M: ""

  # ── Filtry kategoryczne — domyślnie puste = wszystkie widoczne ────────────────
  defaultCurrencies: []   # np. [EUR, USD]
  defaultStrategies: []   # long-only | active | short-leveraged
  defaultDividends:  []   # Acc | Dist
  defaultCountries:  []   # Ireland | Luxembourg | …

  # ── Filtr brokerów — puste = brak filtra, podaj nazwy: [xtb, bossa, mbank] ───
  # Pokazuje tylko ETF-y dostępne u co najmniej jednego z podanych brokerów.
  defaultBrokers:
    - xtb

  # ── Twarde wykluczenia (zawsze, niezależnie od UI) ────────────────────────────
  excludeIsins: []
  # Przykład:
  # excludeIsins:
  #   - IE00B4L5Y983   # iShares Core MSCI World — zbyt duże pokrycie z innymi

scraper:
  # Maksymalna liczba ETFów do pobrania z JustETF
  maxEtfs: 10000
